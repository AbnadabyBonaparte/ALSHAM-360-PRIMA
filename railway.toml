# ================================================
# ALSHAM 360 PRIMA - Railway Configuration
# ================================================
# All secrets must be set via Railway dashboard, never in this file.

[build]
builder = "nixpacks"

[deploy]
startCommand = "node server.js"
restartPolicyType = "ON_FAILURE"

[environments.production]
NODE_ENV = "production"
PORT = "3000"
RATE_LIMIT_MAX = "2000"
RATE_LIMIT_WINDOW = "900000"
LOG_LEVEL = "warn"
DB_TIMEOUT = "30"
MAX_PAYLOAD_SIZE = "10"
APP_BASE_URL = "https://app.alshamglobal.com.br"
